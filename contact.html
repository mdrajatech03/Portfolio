<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Md Raja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #081b29;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .contact-wrapper {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0, 171, 240, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* Left Side: Contact Info */
        .contact-info {
            background: #00abf0;
            padding: 40px;
            color: #081b29;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .contact-info h2 { font-size: 30px; margin-bottom: 20px; }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-item i {
            font-size: 20px;
            background: #081b29;
            color: #00abf0;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .info-item p { font-weight: 500; font-size: 15px; }

        /* Right Side: Form */
        .contact-form {
            padding: 40px;
            background: transparent;
        }

        .contact-form h2 {
            margin-bottom: 30px;
            font-size: 30px;
        }

        .contact-form span { color: #00abf0; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-box {
            position: relative;
            width: 100%;
        }

        .input-box input, .input-box textarea {
            width: 100%;
            padding: 12px 15px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            outline: none;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-box textarea { height: 150px; resize: none; grid-column: span 2; }

        .input-box input:focus, .input-box textarea:focus {
            border-color: #00abf0;
            box-shadow: 0 0 10px #00abf0;
        }

        .submit-btn {
            background: #00abf0;
            color: #081b29;
            padding: 12px 35px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            box-shadow: 0 0 20px #00abf0;
            transform: scale(1.05);
        }

        .back-home {
            display: block;
            margin-top: 20px;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .input-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="contact-wrapper">
        <div class="contact-info">
            <div>
                <h2>Contact Info</h2>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <p>mdraja.tech.03@gmail.com</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <p>+91 XXXXXXXXXX</p>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <p>Sharda University, Greater Noida</p>
                </div>
            </div>
            
            <p style="font-size: 13px; opacity: 0.8;">Available for Freelance & Full-time opportunities.</p>
        </div>

        <div class="contact-form">
            <h2>Let's <span>Connect!</span></h2>
            <form id="my-form">
                <div class="input-group">
                    <div class="input-box">
                        <input type="text" placeholder="Full Name" required>
                    </div>
                    <div class="input-box">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                </div>
                <div class="input-group" style="grid-template-columns: 1fr;">
                    <div class="input-box">
                        <input type="text" placeholder="Subject">
                    </div>
                    <div class="input-box">
                        <textarea placeholder="Tell me about your project..."></textarea>
                    </div>
                </div>
                <button type="submit" class="submit-btn">
                    Send Message <i class="fas fa-paper-plane"></i>
                </button>
                <a href="index.html" class="back-home">← Back to Portfolio</a>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('my-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Raja, your message has been sent successfully! (Note: Connect this to EmailJS or Formspree for real emails)');
            this.reset();
        });
    </script>
</body>
</html>
