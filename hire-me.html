<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Me | Md Raja</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #081b29; color: #fff; line-height: 1.6; }

        .container { padding: 60px 10%; }
        .back-link { color: #00abf0; text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: 600; }
        
        .hire-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; }
        
        /* Left Side Content */
        .pitch h1 { font-size: 45px; color: #00abf0; margin-bottom: 15px; }
        .pitch span { color: #fff; }
        .pitch p { color: #ccc; margin-bottom: 25px; }

        .benefits { list-style: none; margin-bottom: 30px; }
        .benefits li { margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .benefits li i { color: #00abf0; }

        /* Form Styling */
        .hire-form {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(0, 171, 240, 0.3);
        }
        .input-box { margin-bottom: 20px; }
        .input-box input, .input-box select, .input-box textarea {
            width: 100%; padding: 12px; background: transparent; border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: #fff; outline: none;
        }
        .input-box input:focus, .input-box textarea:focus { border-color: #00abf0; }
        
        .submit-btn {
            width: 100%; padding: 15px; background: #00abf0; border: none; border-radius: 8px;
            color: #081b29; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { box-shadow: 0 0 20px #00abf0; transform: translateY(-3px); }

        @media (max-width: 850px) { .hire-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>

        <div class="hire-grid">
            <div class="pitch">
                <h1>Hire <span>Me</span></h1>
                <p>I am a Fresher Developer with a strong foundation in Web Tech and Java. I am ready to bring my energy and skills to your next project.</p>
                <ul class="benefits">
                    <li><i class="fas fa-check"></i> Fast Learner & Adaptable</li>
                    <li><i class="fas fa-check"></i> Clean & Scalable Code</li>
                    <li><i class="fas fa-check"></i> On-time Project Delivery</li>
                </ul>
            </div>

            <div class="hire-form">
                
                <form id="hire-form">
                    <input type="hidden" name="form_type" value="Hire_Me Visiting Form">
    <div class="input-box">
        <input type="text" name="from_name" placeholder="Your Name" required>
    </div>
    <div class="input-box">
        <input type="email" name="email" placeholder="Your Email" required>
    </div>
    <div class="input-box">
        <select name="service">
            <option>Web Development</option>
            <option>Java Project</option>
            <option>Graphic Design</option>
        </select>
    </div>
    <div class="input-box">
        <textarea name="message" placeholder="Message" rows="5" required></textarea>
    </div>
    <button type="submit" class="submit-btn">Send Proposal</button>
                </form>
                
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function() {
    emailjs.init("GFinUe87kRtSrUttm"); // Aapki Public Key
})();

const hireForm = document.getElementById("hire-form");

hireForm.addEventListener("submit", function(event) {
    event.preventDefault();

    const btn = document.querySelector(".submit-btn");
    btn.innerText = "Sending...";

    const serviceID = 'service_y6e8v7t';
    const adminTemplate = 'template_5c2c9mn';
    const userTemplate = 'template_sdsfe39';

    // 1. Raja (Admin) ko mail bhej rahe hain
    emailjs.sendForm(serviceID, adminTemplate, this)
        .then(() => {
            // 2. User (Client) ko auto-reply bhej rahe hain
            return emailjs.sendForm(serviceID, userTemplate, this);
        })
        .then(() => {
            alert("Success! Your proposal has been submitted. I will get back to you soon.");
            hireForm.reset();
            btn.innerText = "Send Proposal";
        })
        .catch((err) => {
            alert("Oops! Something went wrong. Please try again.");
            console.error("EmailJS Error:", err);
            btn.innerText = "Send Proposal";
        });
});
</script>
    
</body>
</html>
